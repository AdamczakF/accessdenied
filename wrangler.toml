name = "accessdenied"
account_id = ""
workers_dev = false
compatibility_date = "2024-11-25"
main = "src/main.js"


routes = [
	{ pattern = "", custom_domain = true }	
]

# wrangler kv:namespace create IDENTITY_DYNAMIC_THEME_STORE

[[kv_namespaces]] 
binding = "IDENTITY_DYNAMIC_THEME_STORE"
id = "5245c96488fc47b7a92615f20c781db5" # unique ID of the previously created namespace

[vars]
# - BEARER_TOKEN (Defined with wrangler secret put)
CORS_ORIGIN = "accessdenied.filipada.link/debug" # This should be the route pattern domain /debug (https://example.com/debug)
ACCOUNT_ID = "ec795b01c440adebd485e46a76bd267f"
ORGANIZATION_ID = "ec795b01c440adebd485e46a76bd267f"
ORGANIZATION_NAME = "filipadamczak"
DEBUG = "true"
TARGET_GROUP = "admins" # Define the "special group" that you want to use for notification

[site]
bucket = "./build" 

[build]
command = "npm run build"